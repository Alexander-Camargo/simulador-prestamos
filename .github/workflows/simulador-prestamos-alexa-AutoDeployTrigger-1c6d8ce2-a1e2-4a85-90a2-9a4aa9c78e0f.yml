name: Trigger auto deployment for simulador-prestamos-alexa

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/simulador-prestamos-alexa-AutoDeployTrigger-1c6d8ce2-a1e2-4a85-90a2-9a4aa9c78e0f.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.SIMULADORPRESTAMOSALEXA_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.SIMULADORPRESTAMOSALEXA_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.SIMULADORPRESTAMOSALEXA_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: registrosimuladoralex.azurecr.io
          registryUsername: ${{ secrets.SIMULADORPRESTAMOSALEXA_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.SIMULADORPRESTAMOSALEXA_REGISTRY_PASSWORD }}
          containerAppName: simulador-prestamos-alexa
          resourceGroup: RG_Simulador
          imageToBuild: registrosimuladoralex.azurecr.io/simulador-prestamos-alexa:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


